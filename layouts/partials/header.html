<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">{{ .Site.Title }}</span>
    </a>
    <nav>
      <a href="/" class="nav-link{{ if .IsHome }} active{{ end }}">首页</a>
      <a href="/index.xml" class="nav-link">RSS</a>
      <a href="https://github.com/mbwjs" target="_blank" class="nav-link">GitHub</a>
      <button id="theme-toggle" class="theme-btn" aria-label="切换主题" title="切换白天/黑夜模式" onclick="var h=document.documentElement;if(h.hasAttribute('data-theme')){h.removeAttribute('data-theme');localStorage.setItem('theme','light')}else{h.setAttribute('data-theme','dark');localStorage.setItem('theme','dark')}">🌓</button>
    </nav>
  </div>
</header>
