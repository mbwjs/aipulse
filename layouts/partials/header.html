<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">{{ .Site.Title }}</span>
    </a>
    <nav>
      <a href="/" class="nav-link{{ if .IsHome }} active{{ end }}">文章</a>
      <a href="/posts/" class="nav-link{{ if and (not .IsHome) (eq .Section "posts") }} active{{ end }}">存档</a>
      <a href="/index.xml" class="nav-link">RSS</a>
    </nav>
  </div>
</header>
