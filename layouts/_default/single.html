{{ define "main" }}
<a href="/" class="back-link">← 返回首页</a>
<article class="article-post">
  <header class="article-header">
    <div class="article-meta">
      <span class="article-tag">{{ .Section }}</span>
      <span class="article-date">{{ .Date.Format "2006-01-02" }}</span>
    </div>
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <span>作者：{{ .Site.Params.author }}</span>
      <span>阅读时间：约 {{ div (countwords .Content) 250 }} 分钟</span>
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
